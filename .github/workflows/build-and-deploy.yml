name: Build Calculator

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          # List available Xcode versions for debugging
          ls /Applications/ | grep Xcode
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS (no signing)
        run: |
          xcodebuild build \
            -project Calculator.xcodeproj \
            -scheme Calculator \
            -sdk iphoneos \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty

      - name: Build archive (unsigned)
        run: |
          xcodebuild archive \
            -project Calculator.xcodeproj \
            -scheme Calculator \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Calculator.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty

      - name: Package unsigned IPA
        run: |
          # Manually create IPA from the archive
          mkdir -p $RUNNER_TEMP/Payload
          cp -r $RUNNER_TEMP/Calculator.xcarchive/Products/Applications/Calculator.app $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP && zip -r Calculator-unsigned.ipa Payload/
          echo "IPA created: $(ls -lh $RUNNER_TEMP/Calculator-unsigned.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-unsigned-ipa
          path: ${{ runner.temp }}/Calculator-unsigned.ipa
          retention-days: 30
